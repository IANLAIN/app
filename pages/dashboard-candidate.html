<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>app - Panel del Candidato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/bootstrap.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="brand"><span class="brand-mark">app</span><span class="brand-tag" data-i18n="dash.cand.tag">Panel del candidato</span></a>
    <div class="header-actions">
      <div class="lang-selector">
        <select id="lang-select" class="lang-select">
          <option value="es">ES</option>
          <option value="en">EN</option>
          <option value="fr">FR</option>
          <option value="pt">PT</option>
        </select>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn">☾</button>
      <button id="dyslexic-toggle" class="theme-toggle-btn">Aa</button>
      <button id="logout-btn" class="btn btn-ghost btn-sm" data-i18n="logout">Cerrar sesión</button>
    </div>
  </header>

  <main class="page" id="candidate-dashboard">
    <div id="dashboard-content">
      <!-- Se cargará dinámicamente con JS -->
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-meta" data-i18n="footer.copyright">© 2026 app · Todos los derechos reservados</div>
  </footer>

  <script type="module" src="../js/dashboard-candidate.js"></script>
</body>
</html>
